    function daysSince(dateStr) {
      return Math.max(1, Math.floor((Date.now() - new Date(dateStr).getTime()) / 86400000));
    }

    function StatusBadge({ statusId }) {
      const s = PORTAL_STATUS[statusId] || { label: "Unknown", color: "#6b7280", bg: "#f9fafb", dot: "#6b7280" };
      return (
        <span style={{ display:"inline-flex", alignItems:"center", gap:5, padding:"2px 8px", borderRadius:99, fontSize:11, fontWeight:600, background:s.bg, color:s.color, border:`1px solid ${s.color}22`, whiteSpace:"nowrap" }}>
          <span style={{ width:6, height:6, borderRadius:"50%", background:s.dot, flexShrink:0 }} />
          {s.label}
        </span>
      );
    }

    function TopPostsTab({ data }) {
      const active = data.filter(d => ACTIVE_STATUS_IDS.includes(d.portalStatusId)).sort((a,b) => b.votes - a.votes).slice(0,25);
      const now = new Date();
      const oneYearAgo = new Date(now.getFullYear()-1, now.getMonth(), now.getDate());
      return (
        <div>
          <div style={{ marginBottom:16, display:"flex", gap:12, flexWrap:"wrap" }}>
            {Object.entries(active.reduce((acc,p) => { const label=(PORTAL_STATUS[p.portalStatusId]||{}).label||"Unknown"; acc[label]=(acc[label]||0)+1; return acc; },{})).map(([label,count]) => (
              <div key={label} style={{ padding:"6px 14px", borderRadius:8, background:"#f3f4f6", fontSize:12, fontWeight:600, color:"#374151" }}>{label}: <span style={{ color:"#6366f1" }}>{count}</span></div>
            ))}
            <div style={{ padding:"6px 14px", borderRadius:8, background:"#ede9fe", fontSize:12, fontWeight:600, color:"#6d28d9" }}>Total votes: {active.reduce((s,p)=>s+p.votes,0).toLocaleString()}</div>
          </div>
          <div style={{ overflowX:"auto" }}>
            <table style={{ width:"100%", borderCollapse:"collapse", fontSize:13 }}>
              <thead>
                <tr style={{ borderBottom:"2px solid #e5e7eb" }}>
                  {["#","Post Title","Portal Status","Votes","Last 1Y est.","Paid est. ~38%","Comments"].map(h => (
                    <th key={h} style={{ padding:"8px 10px", textAlign:h==="#"?"center":"left", fontWeight:700, color:"#374151", whiteSpace:"nowrap", fontSize:12 }}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {active.map((p,i) => {
                  const created = new Date(p.created);
                  const isWithinYear = created >= oneYearAgo;
                  const daysTotal = daysSince(p.created);
                  const last1YEst = isWithinYear ? p.votes : Math.round(p.votes*(365/daysTotal));
                  const paidEst = Math.round(p.votes*0.38);
                  const isEven = i%2===0;
                  return (
                    <tr key={p.id} onClick={() => p.url && window.open(p.url,"_blank")} style={{ background:isEven?"#fafafa":"#fff", borderBottom:"1px solid #f3f4f6", cursor:p.url?"pointer":"default" }}>
                      <td style={{ padding:"9px 10px", textAlign:"center", fontWeight:700, color:"#9ca3af", fontSize:12 }}>{i+1}</td>
                      <td style={{ padding:"9px 10px", maxWidth:280 }}><div style={{ fontWeight:600, color:"#111827", fontSize:13, lineHeight:1.3 }}>{p.title}</div></td>
                      <td style={{ padding:"9px 10px" }}><StatusBadge statusId={p.portalStatusId} /></td>
                      <td style={{ padding:"9px 10px", fontWeight:700, color:"#111827", textAlign:"right" }}>{p.votes.toLocaleString()}</td>
                      <td style={{ padding:"9px 10px", color:"#6b7280", textAlign:"right", fontSize:12 }}>{isWithinYear ? <span style={{ color:"#10b981", fontWeight:600 }}>{p.votes.toLocaleString()}</span> : `~${last1YEst.toLocaleString()}`}</td>
                      <td style={{ padding:"9px 10px", textAlign:"right" }}><span style={{ color:"#8b5cf6", fontWeight:700 }}>{paidEst.toLocaleString()}</span></td>
                      <td style={{ padding:"9px 10px", color:"#6b7280", textAlign:"right" }}>{p.commentCount}</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>
      );
    }

    function VelocityTab({ data, onRefresh, loading }) {
      const active = data.filter(d => ACTIVE_STATUS_IDS.includes(d.portalStatusId));
      const hasLiveData = active.filter(p => (p.votes60d || 0) > 0).length > 3;
      const cohort = active
        .filter(p => (p.votes60d || 0) > 0)
        .map(p => ({ ...p, votes60d: p.votes60d || 0 }))
        .sort((a, b) => b.votes60d - a.votes60d)
        .slice(0, 25);
      const maxVotes60d = cohort.length > 0 ? cohort[0].votes60d : 1;
      const maxTotal = cohort.length > 0 ? Math.max(...cohort.map(p => p.votes)) : 1;

      return (
        <div>
          <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:14 }}>
            <span style={{ background:"#ede9fe", color:"#6d28d9", borderRadius:6, padding:"3px 10px", fontSize:11, fontWeight:700 }}>🔥 VOTES IN LAST 60 DAYS · ALL POSTS</span>
            <span style={{ fontSize:12, color:"#6b7280" }}>Ranked by actual votes cast in last 60 days · irrespective of when post was created</span>
          </div>
          {!hasLiveData ? (
            <div style={{ textAlign:"center", padding:48, color:"#9ca3af", fontSize:13 }}>
              <div style={{ fontSize:32, marginBottom:12 }}>⚡</div>
              <div style={{ fontWeight:700, color:"#374151", fontSize:15, marginBottom:6 }}>Live vote data required</div>
              <div style={{ marginBottom:20 }}>Click Refresh to load real 60-day vote counts from Canny.</div>
              <button onClick={onRefresh} disabled={loading} style={{ padding:"8px 20px", borderRadius:8, border:"none", cursor:loading?"not-allowed":"pointer", background:"linear-gradient(135deg,#6366f1,#8b5cf6)", color:"#fff", fontWeight:700, fontSize:13 }}>
                {loading ? "⏳ Loading…" : "↻ Refresh Now"}
              </button>
            </div>
          ) : (
            <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
              {cohort.map((p, i) => {
                const bar60dPct = Math.min(100, (p.votes60d / maxVotes60d) * 100);
                const barTotalPct = Math.min(100, (p.votes / maxTotal) * 100);
                const isTop = i === 0;
                return (
                  <div key={p.id} onClick={() => p.url && window.open(p.url, "_blank")} style={{ background:"#fff", border:`1px solid ${isTop?"#a78bfa":"#e5e7eb"}`, borderRadius:10, padding:"12px 16px", boxShadow:isTop?"0 0 0 2px #ede9fe":"none", cursor:p.url?"pointer":"default" }}>
                    <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:10, gap:8 }}>
                      <div style={{ flex:1 }}>

                );
              })}
            </div>
          )}

    function HigherMailboxTab() {
      const maxEnt = HIGHER_MBX_DATA[0].mbx_votes;
      const maxTotal = Math.max(...HIGHER_MBX_DATA.map(p => p.total_votes));
      return (
        <div>
          <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:14, flexWrap:"wrap" }}>
            <span style={{ background:"#ecfdf5", color:"#065f46", borderRadius:6, padding:"3px 10px", fontSize:11, fontWeight:700 }}>🏢 HIGHER MAILBOX SEGMENT · &gt;3 MAILBOXES PER DOMAIN</span>
            <span style={{ fontSize:12, color:"#6b7280" }}>Votes from customers with more than 3 active mailboxes · 171,696 higher mailbox domains matched · Sorted by higher mailbox votes</span>
          </div>
          <div style={{ background:"#f0fdf4", border:"1px solid #bbf7d0", borderRadius:8, padding:"10px 14px", marginBottom:14, fontSize:12, color:"#166534" }}>
            <strong>Methodology:</strong> Canny voter emails are matched against Titan domains with &gt;3 active mailboxes (from Athena). Higher mailbox vote count = number of voters from qualifying higher mailbox domains.
          </div>
          <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
            {HIGHER_MBX_DATA.map((p, i) => {
              const entPct = Math.min(100, (p.mbx_votes / maxEnt) * 100);
              const totalPct = Math.min(100, (p.total_votes / maxTotal) * 100);
              const entShare = Math.round((p.mbx_votes / p.total_votes) * 100);
              const isTop = i === 0;
              return (
                <div key={p.id} onClick={() => p.url && window.open(p.url, "_blank")} style={{ background:"#fff", border:`1px solid ${isTop?"#6ee7b7":"#e5e7eb"}`, borderRadius:10, padding:"12px 16px", boxShadow:isTop?"0 0 0 2px #d1fae5":"none", cursor:p.url?"pointer":"default" }}>
                  <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:10, gap:8 }}>
                    <div style={{ flex:1 }}>
                      <div style={{ display:"flex", alignItems:"center", gap:6, marginBottom:3 }}>
                        <span style={{ fontSize:12, fontWeight:800, color:"#9ca3af", minWidth:20 }}>#{i+1}</span>
                        {isTop && <span style={{ fontSize:10, background:"#d1fae5", color:"#064e3b", borderRadius:4, padding:"1px 6px", fontWeight:700 }}>TOP SEGMENT</span>}

                    <div style={{ display:"flex", justifyContent:"space-between", marginBottom:3 }}>
                      <span style={{ fontSize:10, color:"#6b7280", fontWeight:600 }}>HIGHER MBX VOTES (&gt;3 MAILBOXES)</span>
                      <span style={{ fontSize:13, fontWeight:800, color:"#059669" }}>{p.mbx_votes.toLocaleString()}</span>
                    </div>
                    <div style={{ height:8, borderRadius:4, background:"#e5e7eb", overflow:"hidden" }}>
                      <div style={{ width:`${entPct}%`, height:"100%", borderRadius:4, background:"linear-gradient(90deg,#059669,#10b981)" }} />
                    </div>
                  </div>
                  <div>
                    <div style={{ display:"flex", justifyContent:"space-between", marginBottom:3 }}>
                      <span style={{ fontSize:10, color:"#6b7280", fontWeight:600 }}>TOTAL ALL-TIME VOTES</span>

        </div>

    function App() {
      const [tab, setTab] = useState("top");
      const [data, setData] = useState(INITIAL_DATA);
      const [loading, setLoading] = useState(false);
      const [lastRefresh, setLastRefresh] = useState(new Date());
      const [refreshMsg, setRefreshMsg] = useState("");

      const handleRefresh = useCallback(async () => {
        setLoading(true); setRefreshMsg("");
        try {
          const response = await fetch("/.netlify/functions/refresh");
          const json = await response.json();
          if (json.posts && json.posts.length > 0) {
            setData(json.posts);
            setLastRefresh(new Date());
            setRefreshMsg("✓ Refreshed — " + json.posts.length + " posts loaded");
          } else {
            setRefreshMsg("⚠ No data returned — showing cached results");
          }
        } catch(e) {
          setRefreshMsg("⚠ Refresh failed — " + e.message);
        }
        setLoading(false);
      }, []);

      return (
        <div style={{ fontFamily:"'Inter',-apple-system,sans-serif", background:"#f9fafb", minHeight:"100vh", padding:20 }}>
          <div style={{ background:"#fff", borderRadius:12, border:"1px solid #e5e7eb", padding:"16px 20px", marginBottom:16, display:"flex", alignItems:"center", justifyContent:"space-between", flexWrap:"wrap", gap:12 }}>
            <div style={{ display:"flex", alignItems:"center", gap:10 }}>
              <div style={{ width:32, height:32, borderRadius:8, background:"linear-gradient(135deg,#6366f1,#8b5cf6)", display:"flex", alignItems:"center", justifyContent:"center", fontSize:16 }}>📊</div>
              <div>
                <div style={{ fontWeight:800, fontSize:17, color:"#111827" }}>Titan Feedback Intelligence</div>
                <div style={{ fontSize:11, color:"#9ca3af", marginTop:1 }}>Live Canny data · Paid est. ~38% · Portal statuses</div>
              </div>
            </div>
            <div style={{ display:"flex", alignItems:"center", gap:10 }}>
              {refreshMsg && <span style={{ fontSize:11, color:refreshMsg.startsWith("✓")?"#10b981":"#f59e0b" }}>{refreshMsg}</span>}
              <span style={{ fontSize:11, color:"#9ca3af" }}>Last: {lastRefresh.toLocaleTimeString()}</span>
              <button onClick={handleRefresh} disabled={loading} style={{ padding:"7px 14px", borderRadius:8, border:"none", cursor:loading?"not-allowed":"pointer", background:loading?"#e5e7eb":"linear-gradient(135deg,#6366f1,#8b5cf6)", color:loading?"#9ca3af":"#fff", fontWeight:700, fontSize:12 }}>
                {loading?"⏳ Loading…":"↻ Refresh"}
              </button>
            </div>
          </div>
          <div style={{ display:"flex", gap:0, marginBottom:16, background:"#fff", borderRadius:10, border:"1px solid #e5e7eb", padding:4, width:"fit-content" }}>
            {[{id:"top",label:"🏆 Top Open Posts"},{id:"velocity",label:"⚡ Recent High Velocity Posts"},{id:"higher mailbox segment",label:"🏢 Higher Mailbox Segment"}].map(t => (
              <button key={t.id} onClick={() => setTab(t.id)} style={{ padding:"7px 18px", borderRadius:7, border:"none", cursor:"pointer", fontWeight:700, fontSize:13, background:tab===t.id?"linear-gradient(135deg,#6366f1,#8b5cf6)":"transparent", color:tab===t.id?"#fff":"#6b7280", transition:"all 0.15s" }}>{t.label}</button>
            ))}
          </div>
          <div style={{ background:"#fff", borderRadius:12, border:"1px solid #e5e7eb", padding:20 }}>
            {tab==="top" ? <TopPostsTab data={data} /> : tab==="velocity" ? <VelocityTab data={data} onRefresh={handleRefresh} loading={loading} /> : <HigherMailboxTab />}
          </div>
          <div style={{ marginTop:12, fontSize:11, color:"#9ca3af", textAlign:"center" }}>
            Paid votes estimated at ~38% of total · Last 1Y votes estimated from creation date · Portal statuses are public-facing
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
